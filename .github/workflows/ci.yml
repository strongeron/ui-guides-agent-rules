name: CI

# Runs on every push and PR — including from forks — so the secret-scan guardrail
# actually gates contributions, not just local runs.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Security gate first: fail the build before anything else if a secret slipped in.
      - name: Scan for secrets
        run: npm run check:secrets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate principle data
        run: npm run validate
