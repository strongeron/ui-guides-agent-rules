name: CI

# Runs on every push and PR — including from forks — so the secret-scan guardrail
# actually gates contributions, not just local runs.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Security gate first: fail the build before anything else if a secret slipped in.
      - name: Scan for secrets
        run: npm run check:secrets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Informational, non-blocking: validate exits non-zero on cosmetic advisories
      # (e.g. canvas/WebGL examples that legitimately use raw colors), so it reports
      # into the log without failing the build. The deterministic gates above block.
      - name: Validate principle data (report only)
        run: npm run validate || true
